[colors]
;background = ${xrdb:color0:#222}
;background = #CC333333
background = #00fdf6e3
background-module= #00fdf6e3
background-alt= #fdf6e3
foreground = #fdf6e3
foreground-alt = #fdf6e3
primary = #fdf6e3
secondary = #fdf6e3
alert = #00fdf6e3
spacer = 15
icon = #fdf6e3

[bar/lower]
height = 25
width = 100%
offset-x = 0
offset-y = 0
radius = 0.0
fixed-center = true

bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
line-color = #f00

border-size = 15
border-color = #00FFFFFF

padding-left = 10
padding-right = 10

module-margin-left = 0
module-margin-right = 0

font-0 = MonoLisa i3b4cx:style=Bold Italic:size=9
font-1 = MonoLisa i3b4cx:style=Bold Italic:size=9
font-2 = Material Icons:style=Regular:size=9

modules-left = sshfs filesystem memory cpu
modules-center = xkeyboard
modules-right = pulseaudio temperature battery wlan eth

tray-position = none

cursor-click = pointer
cursor-scroll = ns-resize

[bar/upper]
height = 25
width = 100%
offset-x = 0
offset-y = 0
radius = 0.0
fixed-center = true

bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 15
border-color = #00FFFFFF

padding-left = 10
padding-right = 10

font-0 = MonoLisa i3b4cx:style=Bold Italic:size=9
font-1 = MonoLisa i3b4cx:style=Bold Italic:size=9
font-2 = Material Icons:style=Regular:size=9

modules-left = i3
modules-center = xwindow
modules-right = date

tray-position = none

cursor-click = pointer
cursor-scroll = ns-resize

[module/xwindow]
type = internal/xwindow
label = "   %title:0:100:...%   "
format-background = ${colors.background-module}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = ""

label-indicator-padding = 2
label-indicator-background = ${colors.background-module}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = "   Óčá  %free%   "
label-mounted-background = ${colors.background-module}

label-unmounted = ""
label-unmounted-foreground = ${colors.foreground-alt}
format-mounted-offset = ${colors.spacer}
format-unmount-offset = ${colors.spacer}

[module/sshfs]
type = internal/fs
interval = 25

mount-0 = /mnt/sshfs

label-mounted = "   ÓäĹ  %free%   "
label-mounted-background = ${colors.background-module}
label-mounted-foreground = ${colors.background-alt}
label-unmounted = "   ÓäĹ  disconnected   "
label-unmounted-background = ${colors.background-module}
label-unmounted-foreground = ${colors.background-alt}

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
format-margin = 0

label-mode-padding = 2
label-mode-foreground = #000
label-mode-background = ${colors.background-module}

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = ${colors.background-module}
label-focused-foreground = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 2
label-focused-margin = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-padding = 2
label-unfocused-margin = 2
label-unfocused-background = ${colors.background-module}
label-unfocused-foreground = ${colors.background-alt}

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

; Separator in between workspaces
label-separator = |


[module/mpd]
type = internal/mpd
;format-online = <label-song>  <icon-prev> <icon-stop> <toggle> <icon-next>
format-online = <label-song>
;format-online-background = #00000000
;format-online-foreground = #88000000
format-online-background = ${colors.background-module}
;format-online-padding = 3

icon-prev = ÓāĖ
icon-stop = Óāô
icon-play = Óāö
icon-pause = Óāõ
icon-next = Óāú

;label-song = %artist% - %album% - %title%
label-song = "   %title%   "
label-song-maxlen = 80
label-song-ellipsis = true

[module/xbacklight]
type = internal/xbacklight

format = <label> <bar>
label = BL

bar-width = 10
bar-indicator = |
bar-indicator-foreground = #fff
bar-indicator-font = 2
bar-fill = ‚ĒÄ
bar-fill-font = 2
bar-fill-foreground = #9f78e1
bar-empty = ‚ĒÄ
bar-empty-font = 2
bar-empty-foreground = ${colors.foreground-alt}

[module/backlight-acpi]
inherit = module/xbacklight
type = internal/backlight
card = intel_backlight

[module/cpu]
type = internal/cpu
interval = 2
;format-prefix = "  ÓĆć "
;format-prefix-foreground = #0098ff
;format-underline = #0098ff
label = "   ÓĆć  %percentage:02%%   "
format-background = ${colors.background-module}
;format-padding = 2
format-offset = ${colors.spacer}

[module/memory]
type = internal/memory
interval = 2
;format-prefix = "   ÓĆĘ "
;format-prefix-foreground = #b500e2
