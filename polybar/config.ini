format-background = ${colors.background-module}
;format-padding = 2
format-offset = ${colors.spacer}

[module/wlan]
type = internal/network
interface = wlp9s0
interval = 3.0

;format-connected-prefix = "   Óėĺ "
format-connected = <label-connected>
;format-connected-underline = #AAAAEE
label-connected = "   Óėĺ  %local_ip% %signal%%   "
format-connected-offset = ${colors.spacer}
format-connected-prefix-foreground = #ffffff

format-connected-background = ${colors.background-module}

format-disconnected-underline = ${self.format-connected-underline}
label-disconnected = "%ifname% disconnected   "
label-disconnected-foreground = ${colors.background-alt}

ramp-signal-0 = Óąė
ramp-signal-1 = Óąô
ramp-signal-2 = Óąö
ramp-signal-3 = Óąö
ramp-signal-4 = Óąö
ramp-signal-foreground = ${colors.foreground-alt}

[module/eth]
type = internal/network
interface = eno1
interval = 3.0

;format-connected-underline = #AAAAEE
format-connected-prefix = "E "
format-connected-prefix-foreground = ${colors.foreground-alt}
label-connected = "%local_ip%   "
format-connected-offset = ${colors.spacer}

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

[module/date]
type = internal/date
interval = 1

date = "%m/%d/%y"
date-alt = "%m/%d/%Y"

time = %H:%M:%S
time-alt = %H:%M:%S

