[module/whoami]
type = custom/script
exec = echo $(whoami)@$(hostname) $(uname -sr)
interval = 1000000
format-background = #00000000
format-foreground = #000
format-padding = 3

[module/nvidiaclock]
type = custom/script
exec = printf "%4s MHz " $(nvidia-settings -q gpucurrentclockfreqs -t | cut -d, -f1 | head -n1)
interval = 10
format-underline = #16ba62
format-offset = ${colors.spacer}
format-prefix = "G "
format-prefix-foreground = ${colors.foreground-alt}

[module/nvidiatemp]
type = custom/script
exec = nvidia-settings -q gpucoretemp -t | head -n1 | sed s/$/¬įC/
interval = 10
format-underline = #16ba62

[module/temperature]
type = internal/temperature
warn-temperature = 55
hwmon-path = /sys/class/hwmon/hwmon0/temp1_input

;format-prefix = "ÓáŅ "
;format-prefix-foreground = #f1535a

format = <label>
format-background = ${colors.background-module}

;format-warn-prefix = "ÓáŅ "
;format-warn-prefix-foreground = ${colors.secondary}

format-warn = <label-warn>
format-warn-background = ${colors.background-module}

;format-offset = -10

;format-padding = 2

label = "   ÓáŅ  %temperature-c%   "
label-warn = "   ÓáŅ  %temperature-c%   "
;label-warn-foreground = ${colors.secondary}
format-offset = ${colors.spacer}

ramp-0 = 0
ramp-1 = 1
ramp-2 = 2
ramp-foreground = ${colors.foreground-alt}

